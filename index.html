<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Aussie Odyssey 🇦🇺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f0f9ff; }
        h1, h2, h3 { font-family: 'Fredoka', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .day-card { transition: all 0.2s ease; cursor: pointer; }
        .day-card:active { transform: scale(0.95); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #4fd1c5; border-radius: 4px; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surf-teal': '#2dd4bf',
                        'sand-beige': '#fde68a',
                        'coral-pop': '#fb7185',
                        'ocean-blue': '#0ea5e9',
                        'tropical-green': '#4ade80',
                        'twilight-purple': '#a78bfa',
                        'market-pink': '#ec4899'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <header class="bg-gradient-to-r from-ocean-blue to-surf-teal text-white p-6 shadow-lg sticky top-0 z-40 rounded-b-3xl">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div>
                <h1 class="text-2xl font-bold tracking-wide italic">The Aussie Odyssey 🇦🇺</h1>
                <p class="text-white/80 text-sm font-medium">60 Day Master Plan</p>
            </div>
            <div class="text-3xl">⛵</div>
        </div>
        <div class="flex gap-3 mt-4 overflow-x-auto hide-scrollbar max-w-4xl mx-auto pb-1">
            <button onclick="scrollToMonth('feb')" class="bg-white/20 hover:bg-white/30 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition">Feb '26</button>
            <button onclick="scrollToMonth('mar')" class="bg-white/20 hover:bg-white/30 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition">Mar '26</button>
            <button onclick="scrollToMonth('apr')" class="bg-white/20 hover:bg-white/30 px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition">Apr '26</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8">
        <!-- Status Hub -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-ocean-blue">
                <h3 class="text-ocean-blue font-bold text-xs uppercase italic">Current Status</h3>
                <p class="text-sm font-bold mt-1">Yamba, NSW</p>
                <p class="text-xs text-gray-500">Boat Trip Tomorrow!</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-market-pink">
                <h3 class="text-market-pink font-bold text-xs uppercase italic">Upcoming</h3>
                <p class="text-sm font-bold mt-1">Sydney Market Blitz</p>
                <p class="text-xs text-gray-500">Mar 14: Glebe | Mar 15: Bondi</p>
            </div>
        </div>

        <div id="calendar-container"></div>
    </main>

    <!-- Detail View Modal -->
    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none" onclick="closeModal(event)">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-95 duration-300" id="modal-content">
            <div id="modal-header" class="h-32 relative flex items-end p-6">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                <div class="relative z-10 text-white">
                    <span id="modal-date" class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 inline-block"></span>
                    <h2 id="modal-title" class="text-2xl font-bold leading-tight"></h2>
                </div>
                <button onclick="closeModal(null, true)" class="absolute top-4 right-4 bg-black/20 text-white rounded-full p-2">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-start gap-4">
                    <div id="modal-icon" class="text-4xl bg-slate-100 p-3 rounded-2xl"></div>
                    <div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider italic">Journey Phase</p>
                        <p id="modal-leg-goal" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>
                </div>
                <hr class="border-slate-100">
                <div>
                    <h3 class="font-bold text-slate-800 mb-2 text-sm italic">The Schedule:</h3>
                    <ul id="modal-activities" class="space-y-2 text-sm text-slate-600"></ul>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs text-slate-400 font-bold uppercase">Overnight Stay</p>
                    <p id="modal-stay" class="text-slate-700 font-medium"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const itinerary = {
            "2026-02-08": { title: "Arrive Cairns", icon: "🛬", activities: ["Arrive Cairns", "Pick up Car #1"], stay: "Cairns", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-09": { title: "Rainforest Day", icon: "🐊", activities: ["Daintree Rainforest", "Cape Tribulation"], stay: "Cairns", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-10": { title: "Waterfalls", icon: "💦", activities: ["Fairy Falls & Josephine Falls", "Evening: Drive to Port Douglas"], stay: "Port Douglas", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-11": { title: "Great Barrier Reef", icon: "🐠", activities: ["8:00 AM Departure", "Full Day Reef Tour", "Night Drive to Townsville"], stay: "Townsville", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-12": { title: "To Airlie Beach", icon: "🛣️", activities: ["Morning drive to Airlie (3.5h)", "Check-in & Lagoon"], stay: "Airlie Beach", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-13": { title: "Airlie Chill", icon: "🏖️", activities: ["Relax by the lagoon"], stay: "Airlie Beach", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-14": { title: "Valentine's Day", icon: "❤️", activities: ["Morning: Scenic Flight", "Dinner @ The Belvedere"], stay: "Airlie Beach", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-15": { title: "Whitehaven Beach", icon: "🚤", activities: ["Ocean Rafting tour"], stay: "Airlie Beach", leg: "Tropical North", color: "bg-tropical-green" },
            "2026-02-16": { title: "Rockhampton", icon: "🚗", activities: ["Drive Airlie to Rockhampton"], stay: "Rockhampton", leg: "Coastal Push", color: "bg-tropical-green" },
            "2026-02-17": { title: "Hervey Bay", icon: "📍", activities: ["Drive to Hervey Bay"], stay: "Hervey Bay", leg: "Coastal Push", color: "bg-tropical-green" },
            "2026-02-18": { title: "K'gari Arrival", icon: "🚙", activities: ["9AM Ferry", "4WD Hire", "Lake McKenzie"], stay: "Kingfisher Bay Resort", leg: "K'gari Adventure", color: "bg-sand-beige" },
            "2026-02-19": { title: "K'gari Beach Day", icon: "🏝️", activities: ["75 Mile Beach", "Maheno Shipwreck", "Eli Creek"], stay: "Hervey Bay", leg: "K'gari Adventure", color: "bg-sand-beige" },
            "2026-02-20": { title: "Noosa Heads", icon: "🌊", activities: ["Drive to Noosa (2.5h)"], stay: "Noosa", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-21": { title: "Noosa River", icon: "🎣", activities: ["Hire a boat & Fish"], stay: "Noosa", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-22": { title: "Noosa Surf Lesson", icon: "🏄", activities: ["Morning: Surf Lesson", "Afternoon: National Park Walk"], stay: "Noosa", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-23": { title: "Australia Zoo", icon: "🐊", activities: ["Drive to Brisbane via Zoo"], stay: "Brisbane", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-24": { title: "Brisbane City", icon: "🛍️", activities: ["Queen St Mall Shopping", "Southbank"], stay: "Brisbane", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-25": { title: "Brisbane Explore", icon: "🚶", activities: ["Howard Smith Wharves", "Relax"], stay: "Brisbane", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-26": { title: "Koala Sanctuary", icon: "🐨", activities: ["Lone Pine Sanctuary visit"], stay: "Brisbane", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-27": { title: "Tangalooma", icon: "🐬", activities: ["Scooby-Doo Tangalooma Trip", "Snorkel Wrecks", "Dolphin Feeding"], stay: "Brisbane", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-02-28": { title: "Movie World", icon: "🎢", activities: ["Movie World Gold Coast", "Wet'n'Wild"], stay: "Surfers Paradise", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-03-01": { title: "U-Turn North", icon: "↩️", activities: ["Drive North to Bundaberg"], stay: "Bundaberg", leg: "Turtle Detour", color: "bg-emerald-400" },
            "2026-03-02": { title: "Turtle Encounter", icon: "🐢", activities: ["Mon Repos Turtles (6PM)"], stay: "Bundaberg", leg: "Turtle Detour", color: "bg-emerald-400" },
            "2026-03-03": { title: "BNE Car Swap", icon: "🔄", activities: ["Drive to BNE Airport", "Swap Car #1 for Car #2", "Check into Brisbane city"], stay: "Brisbane", leg: "The Big Swap", color: "bg-ocean-blue" },
            "2026-03-04": { title: "Gold Coast", icon: "🏙️", activities: ["Drive to Surfers Paradise", "Beach Day"], stay: "Surfers Paradise", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-03-05": { title: "Surfers Relax", icon: "🌊", activities: ["Relax in Surfers Paradise"], stay: "Surfers Paradise", leg: "Sunshine Loop", color: "bg-orange-300" },
            "2026-03-06": { title: "Byron Bay", icon: "🏄", activities: ["Drive to Byron Bay", "Check-in"], stay: "Byron Bay", leg: "Pacific Coast", color: "bg-ocean-blue" },
            "2026-03-07": { title: "Byron Surf", icon: "🤙", activities: ["Surf Session at 'The Pass'"], stay: "Byron Bay", leg: "Pacific Coast", color: "bg-ocean-blue" },
            "2026-03-08": { title: "Nimbin Trip", icon: "☮️", activities: ["Day trip to Nimbin", "Minyon Falls"], stay: "Byron Bay", leg: "Pacific Coast", color: "bg-ocean-blue" },
            "2026-03-09": { title: "To Yamba", icon: "🚗", activities: ["Left Byron Bay", "Arrive in Yamba"], stay: "Yamba", leg: "Pacific Coast", color: "bg-ocean-blue" },
            "2026-03-10": { title: "Yamba Boat Trip", icon: "⛵", activities: ["Morning Boat Trip", "Night: Drive to Port Macquarie"], stay: "Port Macquarie", leg: "Pacific Coast", color: "bg-ocean-blue" },
            "2026-03-11": { title: "Manly Arrival", icon: "⛴️", activities: ["Arrive in Manly", "Beach walk", "Pub dinner"], stay: "Manly", leg: "Sydney & Markets", color: "bg-market-pink" },
            "2026-03-12": { title: "Sydney Center", icon: "🌉", activities: ["Arrive in Sydney Center", "Harbour Bridge Climb", "Explore CBD"], stay: "Sydney Center", leg: "Sydney & Markets", color: "bg-market-pink" },
            "2026-03-13": { title: "Blue Mountains", icon: "⛰️", activities: ["Blue Mountains Day Trip", "Check-in near Glebe"], stay: "Glebe", leg: "Sydney & Markets", color: "bg-market-pink" },
            "2026-03-14": { title: "Glebe Markets", icon: "👕", activities: ["Glebe Markets (Saturday)", "Thrift shopping", "Evening: Move to Bondi"], stay: "Bondi", leg: "Sydney & Markets", color: "bg-market-pink" },
            "2026-03-15": { title: "Bondi Day", icon: "🏖️", activities: ["Bondi Markets (Sunday)", "Bondi to Coogee Walk", "Drive to Jervis Bay"], stay: "Jervis Bay", leg: "Sydney & Markets", color: "bg-market-pink" },
            "2026-03-16": { title: "Hyams Beach", icon: "🏝️", activities: ["Whitest sand in the world", "Relaxing"], stay: "Jervis Bay", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-17": { title: "Kangaroos", icon: "🦘", activities: ["Drive to Batemans Bay", "Pebbly Beach (Kangaroos)"], stay: "Batemans Bay", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-18": { title: "Into Victoria", icon: "🦭", activities: ["Stop at Narooma (Seals)", "Drive to Lakes Entrance"], stay: "Lakes Entrance", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-19": { title: "Fishing Capital", icon: "🦀", activities: ["Full day fishing & crabbing"], stay: "Lakes Entrance", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-20": { title: "Wilsons Prom", icon: "🌳", activities: ["Drive to Tidal River"], stay: "Tidal River", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-21": { title: "Hiking", icon: "🥾", activities: ["Mt Oberon Summit Hike", "Squeaky Beach"], stay: "Tidal River", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-22": { title: "Penguins", icon: "🐧", activities: ["Drive to Phillip Island", "Penguin Parade (Sunset)"], stay: "Phillip Island", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-23": { title: "Melbourne Arrival", icon: "☕", activities: ["Drive to Melbourne", "Laneway exploration"], stay: "Melbourne", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-24": { title: "12 Apostles", icon: "🗿", activities: ["Great Ocean Road Day Trip"], stay: "Melbourne", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-25": { title: "St Kilda", icon: "🎡", activities: ["St Kilda Pier", "Luna Park"], stay: "Melbourne", leg: "Wild South", color: "bg-twilight-purple" },
            "2026-03-26": { title: "City Culture", icon: "🎨", activities: ["Shopping & Laneways"], stay: "Melbourne", leg: "Wild South", color: "bg-twilight-purple" }
        };

        // Fill remaining buffer
        for (let d = 27; d <= 31; d++) {
            itinerary[`2026-03-${d}`] = { title: "Flex Time", icon: "🕰️", activities: ["Relax & Revisit favorites"], stay: "Flexible", leg: "The Buffer", color: "bg-gray-200" };
        }
        for (let d = 1; d <= 8; d++) {
            let dayStr = d < 10 ? `0${d}` : d;
            itinerary[`2026-04-${dayStr}`] = { title: d === 8 ? "Fly Home" : "Flex Time", icon: d === 8 ? "✈️" : "🕰️", activities: d === 8 ? ["Drop Car #2", "Fly Home"] : ["Relax"], stay: d === 8 ? "Home" : "Flexible", leg: "The Buffer", color: "bg-gray-200" };
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            const months = [
                { id: 'feb', name: 'February', year: 2026, days: 28, startDay: 0 },
                { id: 'mar', name: 'March', year: 2026, days: 31, startDay: 0 },
                { id: 'apr', name: 'April', year: 2026, days: 8, startDay: 3 }
            ];

            months.forEach(month => {
                const section = document.createElement('section');
                section.id = month.id;
                section.className = "mb-8";
                const title = document.createElement('h2');
                title.className = "text-xl font-bold text-slate-700 mb-4 sticky top-24 bg-slate-50/90 backdrop-blur-sm py-2 z-30 italic";
                title.textContent = `${month.name} ${month.year}`;
                section.appendChild(title);
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3";
                for(let i=0; i<month.startDay; i++) {
                    const empty = document.createElement('div');
                    empty.className = "hidden lg:block";
                    grid.appendChild(empty);
                }
                for(let d=1; d<=month.days; d++) {
                    const dayNum = d < 10 ? `0${d}` : d;
                    const dateKey = `${month.year}-${month.id === 'feb' ? '02' : month.id === 'mar' ? '03' : '04'}-${dayNum}`;
                    const data = itinerary[dateKey];
                    if (!data) continue;
                    const card = document.createElement('div');
                    card.className = `day-card relative bg-white rounded-xl shadow-sm border border-slate-100 p-3 hover:shadow-md h-32 flex flex-col justify-between overflow-hidden group`;
                    card.onclick = () => openModal(dateKey, data);
                    card.innerHTML = `<div class="absolute top-0 left-0 right-0 h-1.5 ${data.color}"></div>
                        <div class="flex justify-between items-start mt-2">
                            <span class="text-xs font-bold text-slate-400 font-mono">${d}</span>
                            <span class="text-xl group-hover:scale-110 transition-transform">${data.icon}</span>
                        </div>
                        <div>
                            <p class="font-bold text-sm leading-tight text-slate-800 line-clamp-2">${data.title}</p>
                            <p class="text-[10px] text-slate-500 mt-1 truncate italic">${data.stay}</p>
                        </div>`;
                    grid.appendChild(card);
                }
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        const modal = document.getElementById('detail-modal');
        const modalContent = document.getElementById('modal-content');
        function openModal(date, data) {
            const dateObj = new Date(date);
            document.getElementById('modal-date').textContent = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-icon').textContent = data.icon;
            document.getElementById('modal-leg-goal').textContent = data.leg;
            document.getElementById('modal-stay').textContent = data.stay;
            document.getElementById('modal-header').className = `h-32 relative flex items-end p-6 ${data.color}`;
            const list = document.getElementById('modal-activities');
            list.innerHTML = '';
            data.activities.forEach(act => {
                const li = document.createElement('li');
                li.className = "flex gap-2 items-start";
                li.innerHTML = `<span class="mt-1.5 w-1.5 h-1.5 bg-surf-teal rounded-full shrink-0"></span><span>${act}</span>`;
                list.appendChild(li);
            });
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
        }
        function closeModal(e, force) {
            if (force || (e && e.target === modal)) {
                modal.classList.add('opacity-0', 'pointer-events-none');
                modalContent.classList.add('scale-95');
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }
        function scrollToMonth(id) {
            const el = document.getElementById(id);
            window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 140, behavior: "smooth" });
        }
        renderCalendar();
    </script>
</body>
</html>
